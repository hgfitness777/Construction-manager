<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Construction Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #C8860A;
    --orange-dim: #a06808;
    --bg: #F5E6C0;
    --panel: #E8D49A;
    --card: #EFE0A8;
    --border: #C9AA6A;
    --text: #0D1B4B;
    --muted: #4A5E8A;
    --done: #1B6B2F;
    --danger: #b71c1c;
    --danger-dim: #8b1010;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--panel);
    border-bottom: 3px solid var(--orange);
    padding: 14px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: var(--orange);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .job-input-wrap { flex: 1; position: relative; padding-top: 12px; }

  .job-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    position: absolute;
    top: 0;
    left: 2px;
  }

  #jobName {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--border);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    padding: 2px 0;
    outline: none;
    transition: border-color 0.2s;
  }
  #jobName:focus { border-bottom-color: var(--orange); }
  #jobName::placeholder { color: #8A7040; }

  /* Project action buttons row */
  .header-actions {
    display: flex;
    gap: 8px;
  }

  .btn-new {
    flex: 1;
    background: var(--orange);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 9px 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-new:active { background: var(--orange-dim); }

  .btn-projects {
    flex: 1;
    background: var(--text);
    border: none;
    border-radius: 8px;
    color: var(--bg);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 9px 12px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-projects:active { opacity: 0.8; }

  /* ── PROJECTS DRAWER ── */
  .drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
  }
  .drawer-overlay.open { display: block; }

  .drawer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--panel);
    border-top: 3px solid var(--orange);
    border-radius: 18px 18px 0 0;
    z-index: 201;
    max-height: 70vh;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }
  .drawer.open { transform: translateY(0); }

  .drawer-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 4px;
  }

  .drawer-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--text);
    padding: 8px 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .project-list {
    overflow-y: auto;
    flex: 1;
  }

  .project-item {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .project-item:active { background: rgba(200,134,10,0.1); }
  .project-item.active-project { background: rgba(200,134,10,0.15); }

  .project-item-info { flex: 1; min-width: 0; }

  .project-item-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .project-item.active-project .project-item-name { color: var(--orange); }

  .project-item-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .project-del-btn {
    background: transparent;
    border: none;
    color: #9A8050;
    font-size: 20px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    transition: color 0.15s;
  }
  .project-del-btn:active { color: var(--danger); }

  .drawer-empty {
    padding: 30px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    font-style: italic;
  }

  /* ── CONFIRM MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--panel);
    border-radius: 14px;
    border: 2px solid var(--orange);
    padding: 24px 20px 20px;
    width: 100%;
    max-width: 340px;
  }

  .modal-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .modal-body {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .modal-actions { display: flex; gap: 10px; }

  .modal-cancel {
    flex: 1;
    background: transparent;
    border: 2px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    padding: 10px;
    cursor: pointer;
  }

  .modal-confirm {
    flex: 1;
    background: var(--orange);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    padding: 10px;
    cursor: pointer;
  }
  .modal-confirm.danger { background: var(--danger); }

  /* ── MAIN CONTENT ── */
  main { padding: 20px 16px; display: flex; flex-direction: column; gap: 20px; }

  .section-card {
    background: var(--card);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .section-head {
    background: var(--orange);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }

  .section-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: rgba(255,255,255,0.35);
    line-height: 1;
  }

  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 1.5px;
    color: #fff;
    flex: 1;
  }

  .section-count {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    background: rgba(0,0,0,0.2);
    color: #fff;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .section-chevron {
    color: rgba(255,255,255,0.7);
    font-size: 18px;
    transition: transform 0.25s;
  }
  .section-card.collapsed .section-chevron { transform: rotate(-90deg); }

  .section-body {
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .section-card.collapsed .section-body { max-height: 0 !important; }

  .item-list { list-style: none; }

  .item-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    animation: slideIn 0.2s ease;
  }
  .item-row:last-child { border-bottom: none; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .check-btn {
    width: 26px;
    height: 26px;
    min-width: 26px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 14px;
    color: transparent;
  }
  .check-btn:active { transform: scale(0.9); }
  .item-row.done .check-btn {
    background: var(--done);
    border-color: var(--done);
    color: #fff;
  }

  .item-text {
    flex: 1;
    font-size: 15px;
    line-height: 1.4;
    color: var(--text);
    transition: all 0.2s;
    word-break: break-word;
  }
  .item-row.done .item-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .del-btn {
    background: transparent;
    border: none;
    color: #9A8050;
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .del-btn:active { color: var(--danger); }

  .add-row {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: #E2CC88;
    border-top: 1px solid var(--border);
  }

  .add-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .add-input:focus { border-color: var(--orange); }
  .add-input::placeholder { color: #8A7040; }

  .add-btn {
    background: var(--orange);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    width: 42px;
    min-width: 42px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .add-btn:active { background: var(--orange-dim); }

  .empty-state {
    padding: 20px 16px;
    text-align: center;
    color: #8A7040;
    font-size: 14px;
    font-style: italic;
  }

  .mgmt-field {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .mgmt-field:last-child { border-bottom: none; }

  .mgmt-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--orange);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .mgmt-textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    padding: 9px 12px;
    outline: none;
    resize: none;
    min-height: 70px;
    transition: border-color 0.2s;
  }
  .mgmt-textarea:focus { border-color: var(--orange); }
  .mgmt-textarea::placeholder { color: #8A7040; }

  .footer {
    text-align: center;
    margin-top: 30px;
    font-size: 12px;
    color: #8A7040;
    letter-spacing: 1px;
    font-family: 'Barlow Condensed', sans-serif;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-top">
    <div class="logo">⚒ CM</div>
    <div class="job-input-wrap">
      <span class="job-label">Job Name</span>
      <input id="jobName" type="text" placeholder="Enter job name…" autocomplete="off" spellcheck="false">
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-new" id="btnNew">+ New Project</button>
    <button class="btn-projects" id="btnProjects">📁 My Projects</button>
  </div>
</header>

<!-- PROJECTS DRAWER -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">MY PROJECTS</div>
  <div class="project-list" id="projectList"></div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Start New Project?</div>
    <div class="modal-body" id="modalBody">Your current project will be saved and you can return to it anytime from "My Projects".</div>
    <div class="modal-actions">
      <button class="modal-cancel" id="modalCancel">Cancel</button>
      <button class="modal-confirm" id="modalConfirm">Continue</button>
    </div>
  </div>
</div>

<main id="main"></main>
<div class="footer">CONSTRUCTION MANAGER</div>

<script>
const SECTIONS = [
  { id: 'tasks',      num: '1', title: 'TASKS',      placeholder: 'Add a task…' },
  { id: 'materials',  num: '2', title: 'MATERIALS',  placeholder: 'Add a material…' },
  { id: 'tools',      num: '3', title: 'TOOLS',      placeholder: 'Add a tool…' },
  { id: 'management', num: '4', title: 'MANAGEMENT', special: true },
];

const MGMT_FIELDS = [
  { key: 'notes',  label: 'NOTES',                    ph: 'General notes…' },
  { key: 'subs',   label: 'SUBCONTRACTOR MANAGEMENT', ph: 'Names, companies, phone numbers…' },
  { key: 'issues', label: 'ISSUES / DELAYS',          ph: 'Log any problems or delays…' },
];

// ── STATE ──
function blankProject(name) {
  return {
    id: Date.now().toString(),
    jobName: name || '',
    createdAt: new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }),
    tasks: [], materials: [], tools: [],
    management: { notes: '', subs: '', issues: '' },
    collapsed: {}
  };
}

function loadAll() {
  try {
    const raw = localStorage.getItem('cm_projects');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // First run — create a blank project
  const first = blankProject('');
  const store = { activeId: first.id, projects: [first] };
  saveAll(store);
  return store;
}

function saveAll(store) {
  try { localStorage.setItem('cm_projects', JSON.stringify(store)); } catch(e) {}
}

let store = loadAll();

function activeProject() {
  return store.projects.find(p => p.id === store.activeId) || store.projects[0];
}

// ── MODAL ──
let modalCallback = null;

function showModal(title, body, confirmLabel, isDanger, cb) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').textContent = body;
  const btn = document.getElementById('modalConfirm');
  btn.textContent = confirmLabel;
  btn.className = 'modal-confirm' + (isDanger ? ' danger' : '');
  modalCallback = cb;
  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('modalCancel').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
  modalCallback = null;
});

document.getElementById('modalConfirm').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
  if (modalCallback) { modalCallback(); modalCallback = null; }
});

// ── DRAWER ──
function openDrawer() {
  renderDrawer();
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);

document.getElementById('btnProjects').addEventListener('click', openDrawer);

function renderDrawer() {
  const list = document.getElementById('projectList');
  list.innerHTML = '';

  if (store.projects.length === 0) {
    list.innerHTML = '<div class="drawer-empty">No saved projects yet.</div>';
    return;
  }

  // Show newest first
  [...store.projects].reverse().forEach(p => {
    const item = document.createElement('div');
    item.className = 'project-item' + (p.id === store.activeId ? ' active-project' : '');

    const total = p.tasks.length + p.materials.length + p.tools.length;
    const done  = [...p.tasks, ...p.materials, ...p.tools].filter(i => i.done).length;

    item.innerHTML = `
      <div class="project-item-info">
        <div class="project-item-name">${escHtml(p.jobName || 'Unnamed Project')}</div>
        <div class="project-item-meta">${p.createdAt} · ${done}/${total} items done</div>
      </div>
      <button class="project-del-btn" data-delid="${p.id}" title="Delete">×</button>
    `;

    // Load project on tap (not delete btn)
    item.addEventListener('click', e => {
      if (e.target.closest('.project-del-btn')) return;
      store.activeId = p.id;
      saveAll(store);
      closeDrawer();
      render();
    });

    list.appendChild(item);
  });

  // Delete buttons
  list.querySelectorAll('.project-del-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const delId = btn.dataset.delid;
      const proj = store.projects.find(p => p.id === delId);
      const name = proj?.jobName || 'Unnamed Project';
      showModal(
        'Delete Project?',
        `"${name}" will be permanently deleted.`,
        'Delete', true,
        () => {
          store.projects = store.projects.filter(p => p.id !== delId);
          if (store.activeId === delId) {
            if (store.projects.length === 0) {
              const fresh = blankProject('');
              store.projects.push(fresh);
              store.activeId = fresh.id;
            } else {
              store.activeId = store.projects[store.projects.length - 1].id;
            }
          }
          saveAll(store);
          render();
          renderDrawer();
        }
      );
    });
  });
}

// ── NEW PROJECT ──
document.getElementById('btnNew').addEventListener('click', () => {
  showModal(
    'Start New Project?',
    'Your current project is saved automatically. You can return to it anytime from "My Projects".',
    'New Project', false,
    () => {
      const fresh = blankProject('');
      store.projects.push(fresh);
      store.activeId = fresh.id;
      saveAll(store);
      render();
      setTimeout(() => document.getElementById('jobName').focus(), 100);
    }
  );
});

// ── RENDER ──
function render() {
  const proj = activeProject();
  const main = document.getElementById('main');
  main.innerHTML = '';

  SECTIONS.forEach(sec => {
    const card = document.createElement('div');
    card.className = 'section-card' + (proj.collapsed[sec.id] ? ' collapsed' : '');

    let countHtml = '';
    if (!sec.special) {
      const items = proj[sec.id];
      const done = items.filter(i => i.done).length;
      countHtml = `<span class="section-count">${done}/${items.length}</span>`;
    }

    card.innerHTML = `
      <div class="section-head" data-id="${sec.id}">
        <span class="section-num">${sec.num}</span>
        <span class="section-title">${sec.title}</span>
        ${countHtml}
        <span class="section-chevron">&#9660;</span>
      </div>
      <div class="section-body" id="body-${sec.id}"></div>
    `;

    const body = card.querySelector(`#body-${sec.id}`);

    if (sec.special) {
      MGMT_FIELDS.forEach(f => {
        const field = document.createElement('div');
        field.className = 'mgmt-field';
        field.innerHTML = `
          <div class="mgmt-label">${f.label}</div>
          <textarea class="mgmt-textarea" data-key="${f.key}" placeholder="${f.ph}" rows="3">${escHtml(proj.management[f.key] || '')}</textarea>
        `;
        body.appendChild(field);
      });
    } else {
      const items = proj[sec.id];
      const ul = document.createElement('ul');
      ul.className = 'item-list';

      if (items.length === 0) {
        ul.innerHTML = `<div class="empty-state">No items yet — add one below</div>`;
      } else {
        items.forEach((item, idx) => {
          const li = document.createElement('li');
          li.className = 'item-row' + (item.done ? ' done' : '');
          li.innerHTML = `
            <button class="check-btn" data-action="check" data-id="${sec.id}" data-idx="${idx}">✓</button>
            <span class="item-text">${escHtml(item.text)}</span>
            <button class="del-btn" data-action="del" data-id="${sec.id}" data-idx="${idx}">×</button>
          `;
          ul.appendChild(li);
        });
      }
      body.appendChild(ul);

      const addRow = document.createElement('div');
      addRow.className = 'add-row';
      addRow.innerHTML = `
        <input class="add-input" data-id="${sec.id}" type="text" placeholder="${sec.placeholder}" maxlength="200">
        <button class="add-btn" data-action="add" data-id="${sec.id}">+</button>
      `;
      body.appendChild(addRow);
    }

    requestAnimationFrame(() => {
      body.style.maxHeight = proj.collapsed[sec.id] ? '0' : body.scrollHeight + 'px';
    });

    main.appendChild(card);
  });

  document.getElementById('jobName').value = proj.jobName;
  attachEvents();
}

function attachEvents() {
  const proj = activeProject();

  document.getElementById('jobName').addEventListener('input', e => {
    proj.jobName = e.target.value;
    saveAll(store);
  });

  document.querySelectorAll('.section-head').forEach(el => {
    el.addEventListener('click', () => {
      proj.collapsed[el.dataset.id] = !proj.collapsed[el.dataset.id];
      saveAll(store); render();
    });
  });

  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const { action, id, idx } = el.dataset;
      if (action === 'check') {
        proj[id][idx].done = !proj[id][idx].done;
        saveAll(store); render();
      } else if (action === 'del') {
        proj[id].splice(Number(idx), 1);
        saveAll(store); render();
      } else if (action === 'add') {
        const input = document.querySelector(`.add-input[data-id="${id}"]`);
        const val = input.value.trim();
        if (val) {
          proj[id].push({ text: val, done: false });
          saveAll(store); render();
          setTimeout(() => {
            const inp = document.querySelector(`.add-input[data-id="${id}"]`);
            if (inp) inp.focus();
          }, 50);
        }
      }
    });
  });

  document.querySelectorAll('.add-input').forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        document.querySelector(`.add-btn[data-id="${inp.dataset.id}"]`)?.click();
      }
    });
  });

  document.querySelectorAll('.mgmt-textarea').forEach(ta => {
    ta.addEventListener('input', e => {
      proj.management[e.target.dataset.key] = e.target.value;
      saveAll(store);
    });
  });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

render();
</script>
</body>
</html>
